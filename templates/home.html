<!DOCTYPE html>
<html>

<head>

<title>Autonomous Quote AI</title>

<style>

*{
margin:0;
padding:0;
font-family:Segoe UI;
}

.video-bg{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
z-index:-1;
object-fit:cover;
}

.overlay{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
background:rgba(0,0,0,0.4);
}

.card{
padding:60px;
border-radius:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
box-shadow:0 8px 40px rgba(0,0,0,0.6);
}

h1{
font-size:50px;
margin-bottom:20px;
}

button{

padding:15px 40px;
font-size:18px;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
cursor:pointer;
}

button:hover{
background:#0072ff;
}

</style>

</head>

<body>

<video autoplay muted loop class="video-bg">
<source src="/static/bg.mp4" type="video/mp4">
</video>

<div class="overlay">

<div class="card">

<h1>Autonomous Quote Agent System</h1>

<p>AI Powered Insurance Decision Engine</p>

<br>

<a href="/input">
<button>START EVALUATION</button>
</a>

</div>

</div>

</body>

</html>
