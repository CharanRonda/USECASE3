<!DOCTYPE html>
<html>

<head>

<title>Evaluation Input</title>

<style>

body{
margin:0;
font-family:Segoe UI;
}

.video-bg{
position:fixed;
min-width:100%;
min-height:100%;
z-index:-1;
object-fit:cover;
}

.container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.form-box{

width:420px;
padding:40px;

background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);

border-radius:12px;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:14px;
border:none;
background:#00c6ff;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0072ff;
}

</style>

</head>

<body>

<video autoplay muted loop class="video-bg">
<source src="/static/bg.mp4" type="video/mp4">
</video>

<div class="container">

<div class="form-box">

<h2>Customer Information</h2>

<form action="/predict" method="POST">

<input type="number" name="premium" placeholder="Quoted Premium" required>

<input type="number" name="accidents" placeholder="Previous Accidents" required>

<input type="number" name="age" placeholder="Driver Age">

<input type="number" name="miles" placeholder="Annual Miles">

<button type="submit">EVALUATE</button>

</form>

</div>

</div>

</body>

</html>
