<!DOCTYPE html>
<html>

<head>

<title>AI Decision Result</title>

<style>

body{
margin:0;
font-family:Segoe UI;
color:white;
}

.video-bg{
position:fixed;
min-width:100%;
min-height:100%;
z-index:-1;
object-fit:cover;
}

.container{
padding:80px;
text-align:center;
}

.grid{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:30px;
margin-top:50px;

}

.card{

padding:30px;

background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);

border-radius:12px;

box-shadow:0 10px 30px rgba(0,0,0,0.6);

}

h1{
font-size:40px;
}

button{
margin-top:40px;
padding:15px 40px;
background:#00c6ff;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0072ff;
}

</style>

</head>

<body>

<video autoplay muted loop class="video-bg">
<source src="/static/bg.mp4" type="video/mp4">
</video>

<div class="container">

<h1>Agent Evaluation Pipeline</h1>

<div class="grid">

<div class="card">
<h3>Agent 1</h3>
<p>Risk Profiler</p>
<p>{{risk}}</p>
</div>

<div class="card">
<h3>Agent 2</h3>
<p>Conversion Predictor</p>
<p>{{conversion}}%</p>
</div>

<div class="card">
<h3>Agent 3</h3>
<p>Premium Advisor</p>
<p>{{advice}}</p>
</div>

<div class="card">
<h3>Agent 4</h3>
<p>Decision Router</p>
<p>{{decision}}</p>
</div>

</div>

<a href="/download">
<button>Download Result</button>
</a>

</div>

</body>

</html>
